```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste de Humor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
padding:20px;
}

.card{
background:white;
width:100%;
max-width:520px;
padding:40px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

h1{
font-size:26px;
margin-bottom:6px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:25px;
}

.progress{
height:6px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
}

.bar{
height:100%;
width:0%;
background:#6366f1;
transition:.4s;
}

.question{
font-size:18px;
margin-bottom:25px;
}

.options button{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
background:white;
cursor:pointer;
font-size:14px;
transition:.2s;
}

.options button:hover{
background:#f3f4ff;
border-color:#6366f1;
}

.result{
text-align:center;
}

.result h2{
margin-bottom:15px;
}

.restart{
margin-top:20px;
background:#6366f1;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>Autoavaliação de Humor</h1>
<p class="subtitle">Responda pensando nas últimas duas semanas.</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="app"></div>

</div>

<script>

const perguntas=[
"Tenho me sentido triste ou para baixo",
"Tenho perdido interesse em atividades",
"Tenho me sentido sem energia",
"Tenho dormido muito ou pouco",
"Tenho me sentido sem esperança",
"Dificuldade de concentração",
"Sinto que tudo exige esforço",
"Sinto culpa ou inutilidade",
"Evito contato social",
"Irrito-me facilmente",
"Dificuldade para decisões",
"Choro com frequência",
"Sinto ansiedade constante",
"Mudança no apetite",
"Perda de motivação",
"Sinto falta de propósito",
"Pensamentos negativos sobre mim",
"Dificuldade em sentir alegria",
"Dificuldade para iniciar tarefas",
"Cansaço frequente",
"Dificuldade para relaxar",
"Sensação de vazio",
"Sinto-me sobrecarregado",
"Pessimismo sobre o futuro",
"Menos interesse social",
"Dificuldade em aproveitar momentos",
"Sinto que nada melhora",
"Dificuldade em levantar pela manhã",
"Perdi interesse em hobbies",
"Sinto-me emocionalmente esgotado"
];

let atual=0;
let pontuacao=0;

const app=document.getElementById("app");
const bar=document.getElementById("bar");

function mostrarPergunta(){

bar.style.width=((atual/perguntas.length)*100)+"%";

app.innerHTML=`

<div class="question">
${atual+1}. ${perguntas[atual]}
</div>

<div class="options">
<button onclick="responder(0)">Nunca</button>
<button onclick="responder(1)">Raramente</button>
<button onclick="responder(2)">Frequentemente</button>
<button onclick="responder(3)">Quase sempre</button>
</div>

`;

}

function responder(valor){

pontuacao+=valor;
atual++;

if(atual<perguntas.length){

mostrarPergunta();

}else{

mostrarResultado();

}

}

function mostrarResultado(){

bar.style.width="100%";

let texto="";

if(pontuacao<=20){
texto="Poucos sinais de sofrimento emocional.";
}
else if(pontuacao<=45){
texto="Alguns sinais de alerta emocional.";
}
else if(pontuacao<=65){
texto="Possíveis sinais de sofrimento emocional.";
}
else{
texto="Nível elevado de sintomas. Considere procurar ajuda profissional.";
}

app.innerHTML=`

<div class="result">

<h2>Resultado</h2>

<p><strong>Pontuação:</strong> ${pontuacao}</p>

<p style="margin-top:10px">${texto}</p>

<button class="restart" onclick="location.reload()">Refazer teste</button>

</div>

`;

}

mostrarPergunta();

</script>

</body>
</html>
```
