<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Teste de Autoavaliação de Humor</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:700px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
margin-bottom:5px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

.progress{
height:8px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
}

.bar{
height:100%;
width:0%;
background:#5b6cff;
transition:0.3s;
}

.question{
font-size:20px;
margin-bottom:25px;
}

.options button{
display:block;
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
background:white;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.options button:hover{
background:#f2f4ff;
}

.nav{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.nav button{
padding:10px 16px;
border:none;
background:#5b6cff;
color:white;
border-radius:6px;
cursor:pointer;
}

.nav button:disabled{
background:#ccc;
cursor:default;
}

.result{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Autoavaliação de Humor</h1>
<p class="subtitle">Responda pensando nas últimas duas semanas.</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="app"></div>

</div>

<script>

const perguntas=[
"Tenho me sentido triste ou para baixo",
"Tenho perdido interesse em atividades",
"Tenho me sentido sem energia",
"Tenho dormido muito ou pouco",
"Tenho me sentido sem esperança",
"Dificuldade de concentração",
"Sinto que tudo exige esforço",
"Sinto culpa ou inutilidade",
"Evito contato social",
"Irrito-me facilmente",
"Dificuldade para decisões",
"Choro com frequência",
"Sinto ansiedade constante",
"Mudança no apetite",
"Perda de motivação",
"Sinto falta de propósito",
"Pensamentos negativos sobre mim",
"Dificuldade em sentir alegria",
"Dificuldade para iniciar tarefas",
"Cansaço frequente",
"Dificuldade para relaxar",
"Sensação de vazio",
"Sinto-me sobrecarregado",
"Pessimismo sobre o futuro",
"Menos interesse social",
"Dificuldade em aproveitar momentos",
"Sinto que nada melhora",
"Dificuldade em levantar pela manhã",
"Perdi interesse em hobbies",
"Sinto-me emocionalmente esgotado"
];

let atual=0;
let respostas=new Array(perguntas.length).fill(null);

const app=document.getElementById("app");
const bar=document.getElementById("bar");

function render(){

bar.style.width=((atual/perguntas.length)*100)+"%";

app.innerHTML=`

<div class="question">
${atual+1}. ${perguntas[atual]}
</div>

<div class="options">

<button onclick="select(0)">Nunca</button>
<button onclick="select(1)">Raramente</button>
<button onclick="select(2)">Frequentemente</button>
<button onclick="select(3)">Quase sempre</button>

</div>

<div class="nav">

<button onclick="prev()" ${atual==0?"disabled":""}>Anterior</button>

<button onclick="next()">Próxima</button>

</div>

`;

}

function select(v){
respostas[atual]=v;
}

function next(){

if(respostas[atual]==null){
alert("Responda antes de continuar");
return;
}

atual++;

if(atual>=perguntas.length){
resultado();
}else{
render();
}

}

function prev(){
atual--;
render();
}

function resultado(){

let total=0;

respostas.forEach(v=>total+=v);

let texto="";

if(total<=20){
texto="Poucos sinais de sofrimento emocional.";
}
else if(total<=45){
texto="Alguns sinais de alerta emocional.";
}
else if(total<=65){
texto="Possíveis sinais de sofrimento emocional.";
}
else{
texto="Nível elevado de sintomas. Considere procurar ajuda profissional.";
}

app.innerHTML=`

<div class="result">

<h2>Resultado</h2>

<p>Pontuação: <strong>${total}</strong></p>

<p>${texto}</p>

<button onclick="location.reload()">Refazer teste</button>

</div>

`;

bar.style.width="100%";

}

render();

</script>

</body>
</html>
```
