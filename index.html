<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Autoavaliação de Humor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.card{
background:white;
width:100%;
max-width:620px;
padding:35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h1{
font-size:26px;
margin-bottom:6px;
}

.subtitle{
color:#666;
margin-bottom:25px;
font-size:14px;
}

.progress{
height:6px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.bar{
height:100%;
width:0%;
background:#6366f1;
transition:.3s;
}

.question{
margin-bottom:28px;
}

.question h3{
font-size:16px;
margin-bottom:12px;
font-weight:500;
}

.option{
display:block;
padding:10px 14px;
border:1px solid #e5e7eb;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
transition:.2s;
font-size:14px;
}

.option:hover{
background:#f1f5f9;
}

.option input{
margin-right:8px;
}

button{
width:100%;
padding:14px;
background:#6366f1;
border:none;
color:white;
font-size:15px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
transition:.2s;
}

button:hover{
opacity:.9;
}

.result{
margin-top:20px;
padding:18px;
background:#eef2ff;
border-radius:10px;
font-size:14px;
}

.footer{
margin-top:15px;
font-size:11px;
color:#777;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h1>Autoavaliação de Humor</h1>
<p class="subtitle">Responda pensando nas últimas duas semanas.</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<form id="quiz">
<div id="questions"></div>

<button type="button" onclick="calc()">Ver resultado</button>
</form>

<div id="result"></div>

<p class="footer">
Este teste é apenas informativo e não substitui avaliação profissional para sintomas de :contentReference[oaicite:0]{index=0}.
</p>

</div>

<script>

const perguntas=[
"Tenho me sentido triste ou para baixo",
"Tenho perdido interesse em atividades",
"Tenho me sentido sem energia",
"Tenho dormido muito ou pouco",
"Tenho me sentido sem esperança",
"Dificuldade de concentração",
"Sinto que tudo exige esforço",
"Sinto culpa ou inutilidade",
"Evito contato social",
"Irrito-me facilmente",
"Dificuldade para decisões",
"Choro com frequência",
"Sinto ansiedade constante",
"Mudança no apetite",
"Perda de motivação",
"Sinto falta de propósito",
"Pensamentos negativos sobre mim",
"Dificuldade em sentir alegria",
"Dificuldade para iniciar tarefas",
"Cansaço frequente",
"Dificuldade para relaxar",
"Sensação de vazio",
"Sinto-me sobrecarregado",
"Pessimismo sobre o futuro",
"Menos interesse social",
"Dificuldade em aproveitar momentos",
"Sinto que nada melhora",
"Dificuldade em levantar",
"Perdi interesse em hobbies",
"Sinto-me esgotado"
];

const qDiv=document.getElementById("questions");
const bar=document.getElementById("bar");

perguntas.forEach((p,i)=>{

let d=document.createElement("div");
d.className="question";

d.innerHTML=`
<h3>${i+1}. ${p}</h3>

<label class="option"><input type="radio" name="q${i}" value="0" onclick="progress()">Nunca</label>
<label class="option"><input type="radio" name="q${i}" value="1" onclick="progress()">Raramente</label>
<label class="option"><input type="radio" name="q${i}" value="2" onclick="progress()">Frequentemente</label>
<label class="option"><input type="radio" name="q${i}" value="3" onclick="progress()">Quase sempre</label>
`;

qDiv.appendChild(d);

});

function progress(){

let answered=0;

for(let i=0;i<30;i++){
if(document.querySelector(`input[name="q${i}"]:checked`)){
answered++;
}
}

bar.style.width=(answered/30*100)+"%";

}

function calc(){

let total=0;

for(let i=0;i<30;i++){

let r=document.querySelector(`input[name="q${i}"]:checked`);

if(r){
total+=parseInt(r.value);
}

}

let text="";

if(total<=20){
text="Poucos sinais de sofrimento emocional.";
}
else if(total<=45){
text="Alguns sinais de alerta emocional.";
}
else if(total<=65){
text="Possíveis sinais de sofrimento emocional.";
}
else{
text="Nível elevado de sintomas. Considere procurar ajuda profissional.";
}
